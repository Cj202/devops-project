name: CI Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t pavank9209/my-app:${{ github.sha }} .
          docker build -t pavank9209/my-app:latest .

      - name: Push Docker image
        run: |
          docker push pavank9209/my-app:${{ github.sha }}
          docker push pavank9209/my-app:latest

      - name: Update image tag in deployment.yaml
        run: |
          sed -i "s|image: pavank9209/my-app:.*|image: pavank9209/my-app:${{ github.sha }}|" k8s/deployment.yaml

      - name: Commit updated deployment.yaml
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add k8s/deployment.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "CI: update image tag to ${{ github.sha }}"
            git push
          fi
